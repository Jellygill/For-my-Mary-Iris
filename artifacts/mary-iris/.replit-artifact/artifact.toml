kind = "web"
previewPath = "/"
title = "For My Mary Iris"
version = "1.0.0"
id = "artifacts/mary-iris"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24409

[services.development]
run = "pnpm --filter @workspace/mary-iris run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mary-iris", "run", "build" ]
publicDir = "artifacts/mary-iris/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24409"
BASE_PATH = "/"
